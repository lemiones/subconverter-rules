mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxy-providers:
  SubProxyProvider:
    type:  http
    url: {{SUB_PROXY_URL}}
    path: ./provider/SubProxyProvider.yaml
    interval: 7200
    tolerance: 50
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 50
      lazy: true
      expected-status: 204

