      - 🇺🇲 美国节点
      - 🇦🇸 东盟节点
      - 🇸🇦 中东节点
      - 🚀 手动切换
      - DIRECT
  - name: 🚀 手动切换
    type: select
    use:
      - SubProxyProvider
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
